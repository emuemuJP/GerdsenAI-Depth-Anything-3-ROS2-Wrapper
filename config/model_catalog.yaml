    output_type: "relative"
    recommended_for:
      - "AGX_ORIN_64GB"
    compatible_with:
      - "AGX_ORIN_64GB"
      - "X86_GPU"
    optimal_resolutions:
      AGX_ORIN_64GB:
        height: 518
        width: 518
        fps_estimate: 15
        vram_usage_mb: 11000
      X86_GPU:
        height: 518
        width: 518
        fps_estimate: 30
        vram_usage_mb: 11000

  DA3METRIC-LARGE:
    hf_id: "depth-anything/DA3METRIC-LARGE"
    display_name: "DA3-Metric-Large"
    parameters: "350M"
    vram_required_mb: 4000
    license: "CC-BY-NC-4.0"
    license_commercial: false
    description: "Metric depth output (meters) - requires camera intrinsics"
    output_type: "metric"
    use_case: "robotics_navigation"
    recommended_for:
      - "AGX_ORIN_32GB"
      - "AGX_ORIN_64GB"
    compatible_with:
      - "AGX_ORIN_32GB"
      - "AGX_ORIN_64GB"
      - "X86_GPU"
    optimal_resolutions:
      AGX_ORIN_32GB:
        height: 518

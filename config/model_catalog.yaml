# Resolution presets (must be divisible by 14 for ViT patch size)
resolution_presets:
  low:
    height: 308
    width: 308
    description: "Low resolution - fastest, suitable for obstacle avoidance"

  medium:
    height: 518
    width: 518
    description: "Medium resolution - balanced speed and detail"

  high:
    height: 728
    width: 728
    description: "High resolution - more detail, slower inference"

  ultra:
    height: 1022
    width: 1022
    description: "Ultra resolution - maximum detail, requires high-end GPU"

# License information
licenses:
  Apache-2.0:
    name: "Apache License 2.0"
    commercial_use: true
    url: "https://www.apache.org/licenses/LICENSE-2.0"
    summary: "Permissive license allowing commercial use"

  CC-BY-NC-4.0:
    name: "Creative Commons Attribution-NonCommercial 4.0"
    commercial_use: false
    url: "https://creativecommons.org/licenses/by-nc/4.0/"
    summary: "Non-commercial use only. Contact ByteDance for commercial licensing."

# TensorRT Configuration
# Platform-specific TensorRT optimization settings for Jetson deployment
tensorrt:
  # Engine file storage location (relative to repo root)
  engine_directory: "models/tensorrt"
  onnx_directory: "models/onnx"

  # Platform-specific configurations
  platform_configs:
    ORIN_NANO_4GB:
      max_workspace_mb: 512
      recommended_precision: "fp16"
      recommended_resolution: 308
      dla_enabled: false
      expected_fps:
        da3-small_fp16_308: 30
        da3-small_int8_308: 42

    ORIN_NANO_8GB:
      max_workspace_mb: 1024
      recommended_precision: "fp16"
      recommended_resolution: 308
      dla_enabled: false
      expected_fps:
        da3-small_fp16_308: 42
        da3-small_int8_308: 55

    ORIN_NX_8GB:
      max_workspace_mb: 1024
      recommended_precision: "fp16"
      recommended_resolution: 308
      dla_enabled: true
      expected_fps:
        da3-small_fp16_308: 42
        da3-small_fp16_518: 20

    ORIN_NX_16GB:
      max_workspace_mb: 2048
      recommended_precision: "fp16"
      recommended_resolution: 518
      dla_enabled: true
      expected_fps:
        da3-small_fp16_518: 20
        da3-base_fp16_518: 15

    AGX_ORIN_32GB:
      max_workspace_mb: 4096
      recommended_precision: "fp16"
      recommended_resolution: 518
      dla_enabled: true
      expected_fps:
        da3-small_fp16_518: 50
        da3-large_fp16_518: 50

    AGX_ORIN_64GB:
      max_workspace_mb: 8192
      recommended_precision: "fp16"
      recommended_resolution: 518
      dla_enabled: true
      expected_fps:
        da3-small_fp16_518: 60
        da3-large_fp16_518: 50
        da3-large_fp16_1022: 30

    X86_GPU:
      max_workspace_mb: 4096
      recommended_precision: "fp16"
      recommended_resolution: 518
      dla_enabled: false
      expected_fps:
        da3-small_fp16_518: 100
        da3-large_fp16_518: 60

  # Build command template (for reference)
  build_command: |
    python scripts/build_tensorrt_engine.py \
      --model {model} \
      --precision {precision} \
      --resolution {resolution} \
      --output-dir models/

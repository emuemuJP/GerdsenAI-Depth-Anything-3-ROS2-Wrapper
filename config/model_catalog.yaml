# Depth Anything 3 Model Catalog
# This file defines available models with their specifications and platform recommendations.
# Used by setup_models.py for interactive model selection.
#
# TensorRT Support:
# Models with onnx_hf_repo can be converted to TensorRT using build_tensorrt_engine.py.
# This bypasses Issue #22 (ONNX export failure) by using pre-exported ONNX models.

models:
  DA3-SMALL:
    hf_id: "depth-anything/DA3-SMALL"
    display_name: "DA3-Small"
    parameters: "30M"
    vram_required_mb: 1000
    license: "Apache-2.0"
    license_commercial: true
    description: "Lightweight model for resource-constrained devices"
    output_type: "relative"
    # TensorRT support via pre-exported ONNX (bypasses Issue #22)
    onnx_hf_repo: "onnx-community/depth-anything-v3-small"
    onnx_file: "onnx/model.onnx"
    tensorrt:
      supported_precisions: ["fp16", "int8"]
      recommended_precision: "fp16"
      supported_resolutions: [308, 518, 728]
      engine_naming: "da3-small_{precision}_{resolution}x{resolution}_{platform}.engine"
    recommended_for:
      - "ORIN_NANO_4GB"
      - "ORIN_NANO_8GB"
      - "ORIN_NX_8GB"
      - "XAVIER_NX"
    compatible_with:
      - "ALL"
    optimal_resolutions:
      ORIN_NANO_4GB:
        height: 308
        width: 308
        fps_estimate: 30
        vram_usage_mb: 626
      ORIN_NANO_8GB:
        height: 308
        width: 308
        fps_estimate: 42
        vram_usage_mb: 626
      ORIN_NX_8GB:
        height: 308
        width: 308
        fps_estimate: 42
        vram_usage_mb: 626
      ORIN_NX_16GB:
        height: 518
        width: 518
        fps_estimate: 20
        vram_usage_mb: 689
      AGX_ORIN_32GB:
        height: 518
        width: 518
        fps_estimate: 50
        vram_usage_mb: 689
      AGX_ORIN_64GB:
        height: 518
        width: 518
        fps_estimate: 60
        vram_usage_mb: 689
      XAVIER_NX:
        height: 308
        width: 308
        fps_estimate: 20
        vram_usage_mb: 626
      X86_GPU:
        height: 518
        width: 518
        fps_estimate: 100
        vram_usage_mb: 689
      CPU_ONLY:
        height: 308
        width: 308
        fps_estimate: 2
        vram_usage_mb: 0

  DA3-BASE:
    hf_id: "depth-anything/DA3-BASE"
    display_name: "DA3-Base"
    parameters: "100M"
    vram_required_mb: 2000
    license: "CC-BY-NC-4.0"
    license_commercial: false
    description: "Balanced performance and accuracy"
    output_type: "relative"
    # TensorRT support via pre-exported ONNX (bypasses Issue #22)
    onnx_hf_repo: "onnx-community/depth-anything-v3-base"
    onnx_file: "onnx/model.onnx"
    tensorrt:
      supported_precisions: ["fp16", "int8"]
      recommended_precision: "fp16"
      supported_resolutions: [308, 518, 728]
      engine_naming: "da3-base_{precision}_{resolution}x{resolution}_{platform}.engine"
    recommended_for:
      - "ORIN_NX_16GB"
    compatible_with:
      - "ORIN_NX_16GB"
      - "AGX_ORIN_32GB"
      - "AGX_ORIN_64GB"
      - "AGX_XAVIER"
      - "X86_GPU"
    optimal_resolutions:
      ORIN_NX_16GB:
        height: 518
        width: 518
        fps_estimate: 15
        vram_usage_mb: 1800
      AGX_ORIN_32GB:
        height: 518
        width: 518
        fps_estimate: 35
        vram_usage_mb: 1800
      AGX_ORIN_64GB:
        height: 518
        width: 518
        fps_estimate: 45
        vram_usage_mb: 1800
      AGX_XAVIER:
        height: 518
        width: 518
        fps_estimate: 20
        vram_usage_mb: 1800
      X86_GPU:
        height: 518
        width: 518
        fps_estimate: 80
        vram_usage_mb: 1800

  DA3-LARGE-1.1:
    hf_id: "depth-anything/DA3-LARGE-1.1"
    display_name: "DA3-Large-1.1"
    parameters: "350M"
    vram_required_mb: 4000
    license: "CC-BY-NC-4.0"
    license_commercial: false
    description: "High accuracy model - version 1.1 fixes training bugs"
    output_type: "relative"
    # TensorRT support via pre-exported ONNX (bypasses Issue #22)
    onnx_hf_repo: "onnx-community/depth-anything-v3-large"
    onnx_file: "onnx/model.onnx"
    tensorrt:
      supported_precisions: ["fp16", "int8"]
      recommended_precision: "fp16"
      supported_resolutions: [308, 518, 728, 1022]
      engine_naming: "da3-large_{precision}_{resolution}x{resolution}_{platform}.engine"
    recommended_for:
      - "AGX_ORIN_32GB"
      - "AGX_ORIN_64GB"
    compatible_with:
      - "AGX_ORIN_32GB"
      - "AGX_ORIN_64GB"
      - "X86_GPU"
    optimal_resolutions:
      AGX_ORIN_32GB:
        height: 518
        width: 518
        fps_estimate: 50
        vram_usage_mb: 3800
      AGX_ORIN_64GB:
        height: 1022
        width: 1022
        fps_estimate: 30
        vram_usage_mb: 4500
      X86_GPU:
        height: 1022

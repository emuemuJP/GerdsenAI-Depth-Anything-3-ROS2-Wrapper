    gpu_cores: 512
    tensor_cores: 16
    max_power_w: 10
    jetpack_support: ["6.x"]

  ORIN_NANO_8GB:
    display_name: "Jetson Orin Nano 8GB"
    total_ram_gb: 8
    gpu_cores: 1024
    tensor_cores: 32
    max_power_w: 15
    jetpack_support: ["6.x"]

  ORIN_NX_8GB:
    display_name: "Jetson Orin NX 8GB"
    total_ram_gb: 8
    gpu_cores: 1024
    tensor_cores: 32
    max_power_w: 20
    jetpack_support: ["6.x"]

  ORIN_NX_16GB:
    display_name: "Jetson Orin NX 16GB"
    total_ram_gb: 16
    gpu_cores: 1024
    tensor_cores: 32
    max_power_w: 25
    jetpack_support: ["6.x"]

  AGX_ORIN_32GB:
    display_name: "Jetson AGX Orin 32GB"
    total_ram_gb: 32

# Platform specifications for reference
platforms:
  ORIN_NANO_4GB:
    display_name: "Jetson Orin Nano 4GB"
    total_ram_gb: 4
    gpu_cores: 512
    tensor_cores: 16
    max_power_w: 10
    jetpack_support: ["6.x"]

  ORIN_NANO_8GB:
    display_name: "Jetson Orin Nano 8GB"
    total_ram_gb: 8
    gpu_cores: 1024
    tensor_cores: 32
    max_power_w: 15
    jetpack_support: ["6.x"]

  ORIN_NX_8GB:
    display_name: "Jetson Orin NX 8GB"
    total_ram_gb: 8
    gpu_cores: 1024
    tensor_cores: 32
    max_power_w: 20
    jetpack_support: ["6.x"]

  ORIN_NX_16GB:
    display_name: "Jetson Orin NX 16GB"
    total_ram_gb: 16
    gpu_cores: 1024
    tensor_cores: 32
    max_power_w: 25
    jetpack_support: ["6.x"]

  AGX_ORIN_32GB:
    display_name: "Jetson AGX Orin 32GB"
    total_ram_gb: 32
    gpu_cores: 1792
    tensor_cores: 56
    max_power_w: 60
    jetpack_support: ["6.x"]

  AGX_ORIN_64GB:
    display_name: "Jetson AGX Orin 64GB"
    total_ram_gb: 64
    gpu_cores: 2048
    tensor_cores: 64
    max_power_w: 75
    jetpack_support: ["6.x"]

  XAVIER_NX:
    display_name: "Jetson Xavier NX"
    total_ram_gb: 8
    gpu_cores: 384
    tensor_cores: 48
    max_power_w: 20
    jetpack_support: ["5.x"]
    note: "EOL January 2028"

  AGX_XAVIER:
    display_name: "Jetson AGX Xavier"
    total_ram_gb: 32
    gpu_cores: 512
    tensor_cores: 64
    max_power_w: 60
    jetpack_support: ["5.x"]
    note: "EOL January 2028"

  X86_GPU:
    display_name: "x86 with NVIDIA GPU"
    note: "Performance varies by GPU model"

  CPU_ONLY:
    display_name: "CPU Only (No GPU)"
    note: "Very slow inference, use only for testing"

# Resolution presets (must be divisible by 14 for ViT patch size)
resolution_presets:
  low:
    height: 308
    width: 308
    description: "Low resolution - fastest, suitable for obstacle avoidance"

  medium:
    height: 518
    width: 518
    description: "Medium resolution - balanced speed and detail"

  high:
    height: 728
    width: 728
    description: "High resolution - more detail, slower inference"

  ultra:
    height: 1024
    width: 1024
    description: "Ultra resolution - maximum detail, requires high-end GPU"

